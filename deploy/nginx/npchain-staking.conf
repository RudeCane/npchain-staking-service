# NPChain Staking Service — nginx reverse proxy config
#
# Place at:    /etc/nginx/sites-available/npchain-staking
# Enable via:  ln -s ../sites-available/npchain-staking /etc/nginx/sites-enabled/
# Then:        nginx -t && systemctl reload nginx
#
# Cloudflare Flexible SSL terminates HTTPS at the edge, so this listens
# on plain :80 and trusts CF for the public-facing TLS.

server {
    listen 80;
    server_name stake.npchain.org;

    # Cloudflare real-IP restoration (so service logs see real client IPs)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Reasonable rate limits
    limit_req_zone $binary_remote_addr zone=stake_api:10m rate=30r/s;

    # Health check (no rate limiting)
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:8950;
        proxy_set_header Host $host;
        access_log off;
    }

    # Read endpoints — moderately rate-limited
    location ~ ^/api/v1/(stake|validators|leaderboard) {
        limit_req zone=stake_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:8950;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Write endpoints — stricter rate limiting (signed requests should be rare)
    location ~ ^/api/v1/stake/(request-unstake|cancel-unstake) {
        limit_req zone=stake_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:8950;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Auto-generated docs (consider gating in prod)
    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8950;
        proxy_set_header Host $host;
    }

    # Default: 404
    location / {
        return 404;
    }
}
